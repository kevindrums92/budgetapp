<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpend Web Stories Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3/dist/dom-to-image-more.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0b1120;
            color: #f8fafc;
        }

        /* HD Story Canvas (1080x1920) */
        .story-post {
            width: 1080px;
            min-width: 1080px;
            max-width: 1080px;
            height: 1920px;
            background: #020617;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Adjust scale for the preview window */
            transform-origin: top left;
            transform: scale(0.3);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        /* Reset Tailwind preflight borders — Tailwind sets border-style:solid
           on all elements; dom-to-image copies these computed styles making
           invisible 0px borders appear in the exported image. */
        .story-post,
        .story-post *:not(.feature-item):not(.phone-mockup):not(.download-action) {
            border-style: none;
        }

        /* Themes */
        .story-post.emerald {
            background: linear-gradient(160deg, #022c22 0%, #020617 40%, #020617 100%);
        }

        .story-post.dark {
            background: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
        }

        .story-post.sunset {
            background: radial-gradient(circle at top right, #9a3412 0%, #431407 35%, #0c0a09 100%);
        }

        .story-post.ocean {
            background: radial-gradient(circle at bottom right, #164e63 0%, #083344 40%, #020617 100%);
        }

        .story-post.gold {
            background: radial-gradient(circle at top center, #1c1917 0%, #0c0a09 50%, #000000 100%);
        }

        .story-post.white {
            background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 50%, #e2e8f0 100%);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.05);
        }

        .story-post.white .title {
            color: #0f172a;
            text-shadow: none;
        }

        .story-post.white .description {
            color: #475569;
        }

        .story-post.white .brand-text {
            color: #10b981;
        }

        .story-post.white .feature-text {
            color: #0f172a;
        }

        .story-post.white .feature-item {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .story-post.white .phone-mockup {
            border-color: #cbd5e1;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15), inset 0 0 0 2px #e2e8f0;
        }

        .story-post.white .download-text {
            color: white;
        }

        /* Ambient glowing effects */
        .glow-top {
            position: absolute;
            top: -200px;
            right: -200px;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.25) 0%, rgba(16, 185, 129, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        .glow-bottom {
            position: absolute;
            bottom: -300px;
            left: -100px;
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 78, 59, 0.45) 0%, rgba(6, 78, 59, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        /* Content Layout */
        .story-top-content {
            position: absolute;
            top: 180px;
            left: 0;
            width: 100%;
            padding: 0 100px;
            z-index: 20;
            text-align: center;
        }

        .title {
            font-size: 88px;
            font-weight: 700;
            line-height: 1.1;
            color: #ffffff;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .highlight {
            color: #34d399;
            /* Emerald 400 */
        }

        .description {
            font-size: 40px;
            font-weight: 300;
            color: #d1d5db;
            line-height: 1.4;
            margin-bottom: 60px;
        }

        /* Phone Mockup floating in center/bottom */
        .phone-mockup {
            width: 720px;
            /* Slightly narrower than feed */
            height: 1450px;
            background-color: #000;
            border-radius: 64px;
            border: 16px solid #1e293b;
            position: absolute;
            /* Positioning is dynamic via JS based on layout */
            bottom: -150px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 0 0 2px #334155;
            z-index: 10;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center top;
            background-color: #0f172a;
            border-radius: 46px;
            /* Inner radius */
            overflow: hidden;
        }

        /* Features List (Bullets) */
        .features-container {
            position: absolute;
            bottom: 300px;
            left: 0;
            width: 100%;
            padding: 0 100px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(52, 211, 153, 0.3);
            border-radius: 24px;
            padding: 24px 36px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .feature-icon {
            width: 56px;
            height: 56px;
            min-width: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-text {
            color: #fff;
            font-size: 30px;
            font-weight: 500;
            line-height: 1.3;
        }

        /* Bullet Style: Accent Bar (minimal-pills) */
        .feature-item.style-minimal-pills {
            border-left: 5px solid;
            border-top: none;
            border-right: none;
            border-bottom: none;
            border-radius: 16px;
            padding: 22px 32px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(24px);
        }

        .feature-item.style-minimal-pills .feature-text {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* Bullet Style: Floating Tags (compact) */
        .feature-item.style-floating-tags {
            border-radius: 100px;
            padding: 22px 40px;
            gap: 16px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(28px);
            border: 1.5px solid rgba(52, 211, 153, 0.25);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .feature-dot {
            width: 14px;
            height: 14px;
            min-width: 14px;
            border-radius: 50%;
        }

        .feature-item.style-floating-tags .feature-text {
            font-size: 22px;
            font-weight: 500;
        }

        /* Bottom Download Bar (Simulating IG Sticker/Link) */
        .download-action {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 28px 60px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
            z-index: 40;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .download-text {
            color: white;
            font-size: 42px;
            font-weight: 700;
        }

        /* Brand Top bar */
        .brand-bar {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 20;
        }


        .brand-text {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
            vertical-align: middle;
        }

        /* Preview Container Constraint */
        #preview-container {
            width: 324px;
            /* 1080 * 0.3 */
            height: 576px;
            /* 1920 * 0.3 */
            overflow: hidden;
            position: relative;
        }

        /* Fade overlay for text contrast when mockup is behind */
        .text-overlay-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 700px;
            background: linear-gradient(to top, rgba(2, 6, 23, 0.95) 0%, rgba(2, 6, 23, 0.8) 50%, transparent 100%);
            z-index: 25;
            pointer-events: none;
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-[1400px] mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-emerald-400">
                📱 Stories Generator
            </h1>
            <p class="text-slate-400 mt-2">Crea historias inmersivas a 1080x1920px</p>
        </div>

        <div class="flex flex-col xl:flex-row gap-8 items-start justify-center">

            <!-- CONTROLS -->
            <div
                class="w-full xl:w-[45%] bg-slate-800/40 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-slate-700/50 flex flex-col gap-6">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-300">Layout de la Historia</label>
                        <select id="layoutType"
                            class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 text-white focus:border-emerald-500 outline-none">
                            <option value="text-top-phone-bottom">Texto Arriba + Teléfono Abajo</option>
                            <option value="phone-bg-text-bottom">Teléfono de Fondo + Info Abajo</option>
                            <option value="split-left-right">Dividido (Teléfono Izq / Features Der)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-300">Tema</label>
                        <select id="themeStyle"
                            class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 text-white focus:border-emerald-500 outline-none">
                            <option value="emerald">💚 Premium Emerald</option>
                            <option value="dark">🌑 Dark Minimal</option>
                            <option value="sunset">🌅 Sunset Warm</option>
                            <option value="ocean">🌊 Ocean Blue</option>
                            <option value="gold">✨ Midnight Gold</option>
                            <option value="white">⬜ Clean White</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4 border-t border-slate-700/50 pt-4">
                    <h3 class="text-emerald-400 font-medium">Textos Principales</h3>

                    <div>
                        <label class="block text-xs font-medium mb-1 text-slate-400">Título Principal (usa span para
                            verde)</label>
                        <textarea id="titleText" rows="2"
                            class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 text-white text-sm focus:border-emerald-500 outline-none resize-none">¿Sabes en qué se va tu dinero? Ten todo <span class="highlight">bajo control.</span></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-medium mb-1 text-slate-400">Descripción breve</label>
                        <input type="text" id="descText"
                            value="Organiza tus gastos sin compartir tus datos."
                            class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 text-white text-sm focus:border-emerald-500 outline-none">
                    </div>
                </div>

                <div class="space-y-4 border-t border-slate-700/50 pt-4">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-emerald-400 font-medium">✨ Bullets / Features</h3>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-slate-400">Mostrar Features</span>
                            <input type="checkbox" id="showFeatures" checked class="accent-emerald-500 w-4 h-4 rounded">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium mb-2 text-slate-400">Estilo de Bullets</label>
                        <div class="grid grid-cols-2 gap-2" id="bulletStyleGrid">
                            <button type="button" data-style="solid-badge"
                                class="bullet-style-btn active bg-slate-900 border-2 border-emerald-500 rounded-xl p-3 text-left transition-all hover:border-emerald-400">
                                <span class="block text-sm font-medium text-white">Solid Badge</span>
                                <span class="block text-xs text-slate-400 mt-1">Check sólido + glassmorphism</span>
                            </button>
                            <button type="button" data-style="minimal-pills"
                                class="bullet-style-btn bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-left transition-all hover:border-slate-500">
                                <span class="block text-sm font-medium text-white">Minimal Pills</span>
                                <span class="block text-xs text-slate-400 mt-1">Barra lateral, sin icono</span>
                            </button>
                            <button type="button" data-style="staggered"
                                class="bullet-style-btn bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-left transition-all hover:border-slate-500">
                                <span class="block text-sm font-medium text-white">Staggered</span>
                                <span class="block text-xs text-slate-400 mt-1">Escalonado + badge</span>
                            </button>
                            <button type="button" data-style="floating-tags"
                                class="bullet-style-btn bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-left transition-all hover:border-slate-500">
                                <span class="block text-sm font-medium text-white">Floating Tags</span>
                                <span class="block text-xs text-slate-400 mt-1">Compacto, tipo chips</span>
                            </button>
                        </div>
                    </div>

                    <div id="featuresList" class="space-y-2">
                        <input type="text" id="feat1" value="Registro con IA: voz, texto o foto"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white text-sm focus:border-emerald-500 outline-none">
                        <input type="text" id="feat2" value="Recordatorios de pagos y deudas"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white text-sm focus:border-emerald-500 outline-none">
                        <input type="text" id="feat3" value="Registro de gastos en 3s"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white text-sm focus:border-emerald-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-slate-700/50 pt-4">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-300">Captura (Screenshot)</label>
                        <input type="file" id="imageInput" accept="image/*"
                            class="w-full text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-slate-700 file:text-white hover:file:bg-slate-600 text-sm cursor-pointer">
                    </div>

                    <div class="flex flex-col justify-between">
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-medium text-slate-300">Botón de App Store</span>
                            <input type="checkbox" id="showBtn" checked class="accent-emerald-500 w-4 h-4 rounded">
                        </div>
                        <input type="text" id="btnText" value="Descargar Gratis"
                            class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-lg p-2 text-white text-sm focus:border-emerald-500 outline-none">
                    </div>
                </div>

                <button id="downloadBtn"
                    class="w-full mt-2 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-lg transform hover:-translate-y-1 flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Exportar Historia (1080x1920)
                </button>
            </div>

            <!-- LIVE PREVIEW CANVAS -->
            <div
                class="w-full xl:w-auto flex justify-center bg-slate-900/50 rounded-[40px] p-6 border border-slate-800">
                <div id="preview-container">
                    <!-- ACTUAL CANVAS RENDERED FOR DOWNLOAD -->
                    <div id="captureArea" class="story-post emerald">
                        <!-- Ambient Lights -->
                        <div class="glow-top"></div>
                        <div class="glow-bottom"></div>

                        <!-- Brand Top Bar -->
                        <div class="brand-bar">
                            <span class="brand-text">SmartSpend</span>
                        </div>

                        <!-- Primary Text Content -->
                        <div id="renderHeader" class="story-top-content">
                            <h1 id="renderTitle" class="title"></h1>
                            <p id="renderDesc" class="description"></p>
                        </div>

                        <!-- Secondary Text Overlay (Only used in alternative layout) -->
                        <div id="renderGradient" class="text-overlay-gradient" style="display: none;"></div>

                        <!-- Phone Mockup -->
                        <div id="renderMockup" class="phone-mockup">
                            <div id="renderScreen"
                                class="phone-screen flex items-center justify-center">
                                <span class="text-slate-600 text-xl font-light">Carga una imagen...</span>
                            </div>
                        </div>

                        <!-- Features Area -->
                        <div id="renderFeatures" class="features-container">
                            <!-- Injected via JS -->
                        </div>

                        <!-- CTA Sticker -->
                        <div id="renderCta" class="download-action">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span id="renderBtnText" class="download-text">Descargar Gratis</span>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Form Controls
        const layoutType = document.getElementById('layoutType');
        const themeStyle = document.getElementById('themeStyle');
        const titleText = document.getElementById('titleText');
        const descText = document.getElementById('descText');

        const showFeatures = document.getElementById('showFeatures');
        const feat1 = document.getElementById('feat1');
        const feat2 = document.getElementById('feat2');
        const feat3 = document.getElementById('feat3');

        // Bullet style state
        let currentBulletStyle = 'solid-badge';
        document.querySelectorAll('.bullet-style-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.bullet-style-btn').forEach(b => {
                    b.classList.remove('active');
                    b.style.borderColor = '';
                    b.classList.add('border-slate-700');
                    b.classList.remove('border-emerald-500');
                });
                btn.classList.add('active');
                btn.classList.remove('border-slate-700');
                btn.classList.add('border-emerald-500');
                currentBulletStyle = btn.dataset.style;
                updatePreview();
            });
        });

        const imageInput = document.getElementById('imageInput');
        const showBtn = document.getElementById('showBtn');
        const btnText = document.getElementById('btnText');

        // Render Targets
        const captureArea = document.getElementById('captureArea');
        const renderHeader = document.getElementById('renderHeader');
        const renderTitle = document.getElementById('renderTitle');
        const renderDesc = document.getElementById('renderDesc');
        const renderMockup = document.getElementById('renderMockup');
        const renderScreen = document.getElementById('renderScreen');
        const renderFeatures = document.getElementById('renderFeatures');
        const renderCta = document.getElementById('renderCta');
        const renderGradient = document.getElementById('renderGradient');
        const renderBtnText = document.getElementById('renderBtnText');

        // Theme accent color map
        const THEME_ACCENTS = {
            emerald: { highlight: '#34d399', glow: 'rgba(16, 185, 129, 0.25)', glowBottom: 'rgba(6, 78, 59, 0.45)', check: '#34d399', cta: 'linear-gradient(135deg, #10b981 0%, #059669 100%)', ctaShadow: 'rgba(16, 185, 129, 0.3)', featureBorder: 'rgba(52, 211, 153, 0.3)', featureIconBg: 'rgba(16, 185, 129, 0.15)' },
            dark:    { highlight: '#34d399', glow: 'rgba(16, 185, 129, 0.15)', glowBottom: 'rgba(6, 78, 59, 0.25)', check: '#34d399', cta: 'linear-gradient(135deg, #10b981 0%, #059669 100%)', ctaShadow: 'rgba(16, 185, 129, 0.3)', featureBorder: 'rgba(52, 211, 153, 0.3)', featureIconBg: 'rgba(16, 185, 129, 0.15)' },
            sunset:  { highlight: '#fb923c', glow: 'rgba(249, 115, 22, 0.25)', glowBottom: 'rgba(154, 52, 18, 0.4)', check: '#fb923c', cta: 'linear-gradient(135deg, #f97316 0%, #ea580c 100%)', ctaShadow: 'rgba(249, 115, 22, 0.3)', featureBorder: 'rgba(251, 146, 60, 0.3)', featureIconBg: 'rgba(249, 115, 22, 0.15)' },
            ocean:   { highlight: '#22d3ee', glow: 'rgba(6, 182, 212, 0.25)', glowBottom: 'rgba(22, 78, 99, 0.45)', check: '#22d3ee', cta: 'linear-gradient(135deg, #06b6d4 0%, #0891b2 100%)', ctaShadow: 'rgba(6, 182, 212, 0.3)', featureBorder: 'rgba(34, 211, 238, 0.3)', featureIconBg: 'rgba(6, 182, 212, 0.15)' },
            gold:    { highlight: '#fbbf24', glow: 'rgba(217, 119, 6, 0.25)', glowBottom: 'rgba(120, 53, 15, 0.4)', check: '#fbbf24', cta: 'linear-gradient(135deg, #d97706 0%, #b45309 100%)', ctaShadow: 'rgba(217, 119, 6, 0.3)', featureBorder: 'rgba(251, 191, 36, 0.3)', featureIconBg: 'rgba(217, 119, 6, 0.15)' },
            white:   { highlight: '#10b981', glow: 'rgba(16, 185, 129, 0.1)', glowBottom: 'rgba(16, 185, 129, 0.08)', check: '#10b981', cta: 'linear-gradient(135deg, #10b981 0%, #059669 100%)', ctaShadow: 'rgba(16, 185, 129, 0.2)', featureBorder: 'rgba(16, 185, 129, 0.3)', featureIconBg: 'rgba(16, 185, 129, 0.1)' },
        };

        function getSvgCheck(color) {
            return `<svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        }

        function getSvgCheckWhite() {
            return `<svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        }

        function renderFeaturesList() {
            const accent = THEME_ACCENTS[themeStyle.value] || THEME_ACCENTS.emerald;
            renderFeatures.innerHTML = '';
            if (!showFeatures.checked) {
                renderFeatures.style.display = 'none';
                return;
            }

            renderFeatures.style.display = 'flex';
            const features = [feat1.value, feat2.value, feat3.value].filter(v => v.trim() !== '');
            const isWhiteTheme = themeStyle.value === 'white';
            const tc = isWhiteTheme ? '#0f172a' : '#fff';

            const staggerOffsets = [0, 60, 20];

            features.forEach((feat, idx) => {
                const fDiv = document.createElement('div');

                if (currentBulletStyle === 'solid-badge') {
                    fDiv.className = 'feature-item';
                    fDiv.style.background = isWhiteTheme ? 'rgba(255, 255, 255, 0.85)' : 'rgba(15, 23, 42, 0.7)';
                    fDiv.style.backdropFilter = 'blur(28px)';
                    fDiv.style.border = `1.5px solid ${accent.featureBorder}`;
                    fDiv.style.boxShadow = `0 12px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.05)`;
                    fDiv.innerHTML = `<div class="feature-icon" style="background: ${accent.check}; box-shadow: 0 4px 16px ${accent.featureBorder};">${getSvgCheckWhite()}</div><span class="feature-text" style="color: ${tc};">${feat}</span>`;

                } else if (currentBulletStyle === 'minimal-pills') {
                    fDiv.className = 'feature-item style-minimal-pills';
                    fDiv.style.borderLeftColor = accent.check;
                    fDiv.style.background = isWhiteTheme ? 'rgba(255, 255, 255, 0.8)' : 'rgba(15, 23, 42, 0.6)';
                    fDiv.style.backdropFilter = 'blur(24px)';
                    fDiv.style.boxShadow = `0 8px 24px rgba(0, 0, 0, 0.2)`;
                    fDiv.innerHTML = `<span class="feature-text" style="color: ${tc};">${feat}</span>`;

                } else if (currentBulletStyle === 'staggered') {
                    fDiv.className = 'feature-item';
                    fDiv.style.background = isWhiteTheme ? 'rgba(255, 255, 255, 0.85)' : 'rgba(15, 23, 42, 0.7)';
                    fDiv.style.backdropFilter = 'blur(28px)';
                    fDiv.style.border = `1.5px solid ${accent.featureBorder}`;
                    fDiv.style.boxShadow = `0 12px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.05)`;
                    fDiv.style.marginLeft = `${staggerOffsets[idx % staggerOffsets.length]}px`;
                    fDiv.style.borderRadius = '20px';
                    fDiv.innerHTML = `<div class="feature-icon" style="background: ${accent.check}; width: 52px; height: 52px; min-width: 52px; box-shadow: 0 4px 12px ${accent.featureBorder};">${getSvgCheckWhite()}</div><span class="feature-text" style="color: ${tc};">${feat}</span>`;

                } else if (currentBulletStyle === 'floating-tags') {
                    fDiv.className = 'feature-item style-floating-tags';
                    fDiv.style.borderColor = accent.featureBorder;
                    fDiv.style.background = isWhiteTheme ? 'rgba(255, 255, 255, 0.75)' : 'rgba(15, 23, 42, 0.55)';
                    fDiv.style.backdropFilter = 'blur(28px)';
                    fDiv.innerHTML = `<div class="feature-dot" style="background: ${accent.check}; box-shadow: 0 0 12px ${accent.check}40;"></div><span class="feature-text" style="color: ${tc};">${feat}</span>`;
                }

                renderFeatures.appendChild(fDiv);
            });
        }

        function updatePreview() {
            const accent = THEME_ACCENTS[themeStyle.value] || THEME_ACCENTS.emerald;

            // Theme Update
            captureArea.className = 'story-post';
            captureArea.classList.add(themeStyle.value);

            // Basic Texts Update
            renderTitle.innerHTML = titleText.value;
            renderDesc.textContent = descText.value;
            renderBtnText.textContent = btnText.value;

            // Apply theme-adaptive colors
            renderTitle.querySelectorAll('.highlight').forEach(el => el.style.color = accent.highlight);
            document.querySelector('.glow-top').style.background = `radial-gradient(circle, ${accent.glow} 0%, transparent 70%)`;
            document.querySelector('.glow-bottom').style.background = `radial-gradient(circle, ${accent.glowBottom} 0%, transparent 70%)`;
            renderCta.style.background = accent.cta;
            renderCta.style.boxShadow = `0 20px 40px ${accent.ctaShadow}`;

            // Features & Button Toggles
            renderFeaturesList();
            renderCta.style.display = showBtn.checked ? 'flex' : 'none';

            // Reset all dynamic inline styles to avoid conflict between switches
            renderHeader.style = '';
            renderMockup.style = '';
            renderFeatures.style = '';
            renderGradient.style = '';

            const notch = document.querySelector('.phone-notch');
            if (notch) notch.style.display = 'block';

            // Layout Switching Engine
            if (layoutType.value === 'text-top-phone-bottom') {
                // Layout A: Text floats top, Phone cuts at bottom
                renderHeader.style.top = '180px';
                renderHeader.style.left = '0';
                renderHeader.style.width = '100%';
                renderHeader.style.textAlign = 'center';
                renderHeader.style.padding = '0 100px';

                renderMockup.style.width = '720px';
                renderMockup.style.height = '1450px';
                renderMockup.style.bottom = '-150px';
                renderMockup.style.top = 'auto';
                renderMockup.style.left = '50%';
                renderMockup.style.transform = 'translateX(-50%) rotate(0deg)';
                renderMockup.style.borderRadius = '64px';

                renderFeatures.style.flexDirection = 'column';
                renderFeatures.style.bottom = showBtn.checked ? '280px' : '150px';
                renderFeatures.style.top = 'auto';
                renderFeatures.style.left = '0';
                renderFeatures.style.width = '100%';
                renderFeatures.style.padding = '0 100px';
                renderFeatures.style.alignItems = (currentBulletStyle === 'floating-tags') ? 'flex-end' : 'stretch';

                renderGradient.style.display = 'none';

            } else if (layoutType.value === 'phone-bg-text-bottom') {
                // Layout B: Giant phone taking whole background, texts fade in at bottom
                renderHeader.style.top = 'auto';
                renderHeader.style.bottom = showFeatures.checked ? '650px' : (showBtn.checked ? '300px' : '150px');
                renderHeader.style.left = '0';
                renderHeader.style.width = '100%';
                renderHeader.style.textAlign = 'center';
                renderHeader.style.padding = '0 100px';

                renderMockup.style.width = '1000px';
                renderMockup.style.height = '2160px'; // Taller than canvas
                renderMockup.style.top = '-80px';
                renderMockup.style.bottom = 'auto';
                renderMockup.style.left = '50%';
                renderMockup.style.transform = 'translateX(-50%) rotate(0deg)';
                renderMockup.style.borderRadius = '64px';

                renderFeatures.style.flexDirection = 'column';
                renderFeatures.style.bottom = showBtn.checked ? '260px' : '100px';
                renderFeatures.style.top = 'auto';
                renderFeatures.style.left = '0';
                renderFeatures.style.width = '100%';
                renderFeatures.style.padding = '0 100px';
                renderFeatures.style.alignItems = (currentBulletStyle === 'floating-tags') ? 'flex-end' : 'stretch';

                renderGradient.style.display = 'block';
                renderGradient.style.height = '1100px'; // Big bottom fade

            } else if (layoutType.value === 'split-left-right') {
                // Layout C: Split View (Phone Left, Features Right)
                renderHeader.style.top = '150px';
                renderHeader.style.left = '0';
                renderHeader.style.width = '100%';
                renderHeader.style.textAlign = 'center';
                renderHeader.style.padding = '0 100px';

                // Phone is smaller, rotated and positioned on the left
                renderMockup.style.width = '520px';
                renderMockup.style.height = '1060px';
                renderMockup.style.bottom = '250px';
                renderMockup.style.top = 'auto';
                renderMockup.style.left = '-30px';
                renderMockup.style.transform = 'rotate(-8deg)';
                renderMockup.style.borderRadius = '52px';

                // Features are stacked vertically on the right, centered in right half
                renderFeatures.style.flexDirection = 'column';
                renderFeatures.style.top = '50%';
                renderFeatures.style.bottom = 'auto';
                renderFeatures.style.left = '530px';
                renderFeatures.style.width = '520px';
                renderFeatures.style.padding = '0';
                renderFeatures.style.gap = '28px';
                renderFeatures.style.alignItems = 'flex-start';
                renderFeatures.style.transform = 'translateY(-50%)';

                // Adjust the inner feature items for split layout
                const currentFeatures = renderFeatures.querySelectorAll('.feature-item');
                currentFeatures.forEach(el => {
                    el.style.borderRadius = '20px';
                    el.style.padding = '18px 28px';
                    el.style.background = 'rgba(16, 185, 129, 0.15)';
                    el.style.border = '2px solid rgba(52, 211, 153, 0.4)';
                    el.style.boxShadow = '0 20px 40px rgba(0,0,0,0.4)';
                    const textSpan = el.querySelector('.feature-text');
                    if (textSpan) textSpan.style.fontSize = '28px';
                    const iconEl = el.querySelector('.feature-icon');
                    if (iconEl) {
                        iconEl.style.width = '42px';
                        iconEl.style.height = '42px';
                        iconEl.style.minWidth = '42px';
                        iconEl.style.background = 'rgba(16, 185, 129, 0.3)';
                    }
                });

                renderGradient.style.display = 'none';
            }
        }


        // Live Event Listeners
        const inputs = [layoutType, themeStyle, titleText, descText, showFeatures, feat1, feat2, feat3, showBtn, btnText];
        inputs.forEach(input => {
            input.addEventListener('input', updatePreview);
            input.addEventListener('change', updatePreview);
        });

        // Image Handling
        imageInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    renderScreen.style.backgroundImage = `url(${event.target.result})`;
                    renderScreen.innerHTML = ''; // Remove placeholder
                }
                reader.readAsDataURL(file);
            }
        });

        // Setup Initial State
        updatePreview();

        // Download Action — uses dom-to-image-more (SVG foreignObject)
        // Unlike html2canvas (which re-implements CSS in JS and gets it wrong),
        // dom-to-image delegates rendering to the browser's native CSS engine.
        // What you see in the preview = what gets exported.
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const btn = document.getElementById('downloadBtn');
            const oldText = btn.innerHTML;
            btn.innerHTML = 'Generando Historia... ⏳';

            domtoimage.toPng(captureArea, {
                width: 2160,
                height: 3840,
                style: {
                    transform: 'scale(2)',
                    transformOrigin: 'top left',
                    width: '1080px',
                    height: '1920px',
                }
            }).then(dataUrl => {
                btn.innerHTML = oldText;
                const link = document.createElement('a');
                link.download = `SmartSpend-Story-${new Date().getTime()}.png`;
                link.href = dataUrl;
                link.click();
            }).catch(err => {
                console.error("Error generating image:", err);
                btn.innerHTML = 'Error al exportar';
                setTimeout(() => btn.innerHTML = oldText, 3000);
            });
        });
    </script>
</body>

</html>
